top_issues:
  - id: 'TEST-001'
    severity: medium
    category: 'Integration Coverage Gap'
    finding: >-
      End-to-end SQL-trigger ↔ TS-validator parity is not yet proven
      against a live PostgreSQL. The TS-side computeAuditHash and
      validator are 100% covered by unit tests, and the service tests
      exercise the read path — but no test currently spins up Postgres,
      runs migrations 006 + 007, performs an INSERT/UPDATE/DELETE on
      journal_entries, and asserts that the trigger-computed hash
      matches a TS-side recomputation. The hash formula is rigorously
      designed for parity and the service deliberately avoids Date
      round-trip, but a live integration test is the only way to
      catch a future divergence (e.g., a PG version changing JSONB
      key ordering, or a trigger edit not mirrored in TS).
    suggested_owner: dev
    fix: >-
      Add a Testcontainers-Postgres integration test that:
      (1) starts pg with pgcrypto, (2) runs all migrations, (3) inserts
      a row in journal_entries with SET LOCAL app.current_tenant,
      (4) reads the resulting audit_logs row, (5) recomputes via
      computeAuditHash and asserts equality. Deferred from this story
      because Testcontainers infra isn't yet in place at the package
      level.

  - id: 'TEST-002'
    severity: low
    category: 'Coverage Gap'
    finding: >-
      audit.service.ts lines 218-219 and 222-223 (date_from/date_to
      filter branches in validateChain) are uncovered. List endpoint
      date filters ARE covered. ValidateChain works without those
      branches but the conditional logic isn't exercised.
    suggested_owner: dev
    fix: >-
      Add 2 tests to validateChain describe block: one passing
      date_from, one passing date_to, asserting the SQL contains
      the expected predicate.

  - id: 'TEST-003'
    severity: low
    category: 'Controller Coverage Gap'
    finding: >-
      audit.controller.ts has 0% coverage. Methods are thin pass-through
      (constructor + 3 forwarding calls), but the @UseGuards, @Get,
      and @Query decorators aren't exercised — a future change that
      breaks route binding or guard wiring could ship undetected.
    suggested_owner: dev
    fix: >-
      Either (a) add controller-level tests using supertest + a
      lightweight Express harness, or (b) add @nestjs/testing as a
      devDep to enable @Test.createTestingModule(). Option (a) is
      consistent with the repo's existing test idiom.

  - id: 'TEST-INFRA-001'
    severity: low
    category: 'Test Infrastructure'
    finding: >-
      Pre-existing TS errors in src/modules/accounts/* and
      src/modules/entries/* (Story 1.2 / 1.3) prevent global
      `npx tsc --noEmit` from passing cleanly. These do NOT affect
      Story 1.5 — its files compile and test green. Errors:
        - accounts.controller.ts:15 — wrong import path
          '../../auth/guards/jwt-auth.guard' (should be '../auth/...')
        - accounts.service.ts:23 — request.user untyped
        - entries.controller.ts:15 — same wrong import path
        - entries.service.ts:23,31 — request.user untyped
        - entry-lines.service.ts:22 — request.user untyped
      Dev Agent Record explicitly flagged these as out of scope for
      Story 1.5 and proposed a follow-up housekeeping story.
    suggested_owner: dev
    fix: >-
      Open follow-up story: "fix wrong jwt-auth.guard import paths and
      add global Express Request.user typing." The audit module shows
      the correct pattern (correct import path + local cast).

