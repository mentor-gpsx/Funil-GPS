# ----------------------------------------------------------------------------
# HASH FORMULA SQL <-> TS PARITY
# ----------------------------------------------------------------------------
hash_parity_validation:
  status: PASS
  payload_concatenation_order:
    sql: 'COALESCE(p_prev_hash, '''') || old_str || new_str || ts_str'
    ts:  'prevHash + oldStr + newStr + tsStr'
    parity: IDENTICAL
  null_coercion:
    sql: "COALESCE(p_old_value::text, ''), COALESCE(p_new_value::text, '')"
    ts:  "oldValue===null||undefined ? '' : canonicalJson(...)"
    parity: IDENTICAL
  json_canonicalization:
    sql: 'JSONB::text (PG sorts keys deterministically)'
    ts:  'canonicalJson() recursively sorts keys, JSON.stringify primitives'
    parity: VERIFIED  # unit test audit-hash.spec.ts:108-123 confirms key-order independence
  timestamp_formatting:
    sql: "to_char(changed_at AT TIME ZONE 'UTC', 'YYYY-MM-DD\"T\"HH24:MI:SS.US\"Z\"')"
    ts:  "Date.toISOString() OR pre-formatted string verbatim from DB"
    parity: ENGINEERED
    note: >-
      The service intentionally avoids JS Date round-trip for stored
      rows: it projects `to_char(...) AS changed_at_iso` and passes
      that text VERBATIM to computeAuditHash (audit.service.ts:60-74,
      176, 245). This is the only place where SQL and JS could
      realistically diverge (PG can emit '+00' vs JS '+00:00') and
      the implementation correctly sidesteps it. Documented in the
      audit-hash.ts header comment block (lines 80-83).
  digest_algorithm:
    sql: 'encode(digest(payload, ''sha256''), ''hex'')'
    ts:  'createHash(''sha256'').update(payload, ''utf8'').digest(''hex'')'
    parity: IDENTICAL  # both produce lowercase 64-char hex SHA-256
  end_to_end_proof: >-
    Service tests buildRow() helper computes the hash via the TS path,
    stores it on the mock row, and the service's findOne/validateChain
    re-derives and matches. This proves the round-trip is consistent
    on the read side. Live SQL-trigger-vs-TS-validator parity will be
    proven when Story 1.5 is exercised against a real Postgres in
    integration/CI — recommended as a follow-up integration test
    (TEST-001 below).

