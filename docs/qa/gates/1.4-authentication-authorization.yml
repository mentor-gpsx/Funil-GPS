# ----------------------------------------------------------------------------
# RESOLUTION OF PRIOR ISSUES
# ----------------------------------------------------------------------------
prior_issues_resolved:
  - id: 'SEC-001'
    prior_severity: HIGH
    finding_was: 'Backup codes generated/persisted but never consumed.'
    resolution: >-
      `POST /auth/mfa/verify-login-backup` exposed in auth.controller.ts:73-89.
      `AuthService.verifyBackupCode` (auth.service.ts:284-349) verifies the
      mfa_pending session token, iterates `mfa_backup_codes` with
      `bcrypt.compare`, removes the matched code atomically with token
      issuance (single-use), increments failed-login counter on miss
      (lockout integration), and returns the same uniform "Invalid backup
      code" error on no-match / no-codes-left to prevent enumeration of
      remaining recovery state. Eight dedicated test cases under
      `verifyBackupCode` describe block (auth.spec.ts:476-700) cover the
      happy path, single-use guarantee, uniform error on no-codes-left,
      MFA-not-enrolled rejection, wrong-token-type rejection, and
      registers-failed-attempt-on-miss path. ALL PASS.
    status: RESOLVED

  - id: 'TEST-001'
    prior_severity: HIGH
    finding_was: 'Test infrastructure absent — packages/backend/ had no package.json/tsconfig.json/jest.config.'
    resolution: >-
      Created packages/backend/package.json (NestJS 10 + jest 29 + ts-jest
      29 + bcrypt + speakeasy + qrcode + jsonwebtoken + pg + types), plus
      tsconfig.json (strict + decorators + ES2022) and jest.config.js
      (ts-jest preset, src rootDir, 30s timeout). Verified: `npm test`
      (filtered to src/modules/auth) produces "Test Suites: 5 passed, 5
      total / Tests: 78 passed, 78 total / Time: 9.972s". Three other
      module spec files (entries, accounts) fail to compile due to
      separate missing deps (@nestjs/testing, supertest) — these are
      Story 1.2 / 1.3 concerns, not Story 1.4 scope. Auth scope is fully
      verified.
    status: RESOLVED

