# ----------------------------------------------------------------------------
# REMAINING RISKS (NON-BLOCKING)
# ----------------------------------------------------------------------------
top_issues:
  - id: 'TEST-002'
    severity: low
    category: 'Coverage Gap'
    finding: >-
      Account lockout trigger path (5 sequential failed attempts ⇒
      locked_until set) is asserted indirectly via registerFailedAttempt
      mock-call assertions but lacks a dedicated end-to-end "5th failure"
      integration test. Already-locked rejection IS covered.
    suggested_owner: dev
    fix: >-
      Add an integration test that calls login() five times with wrong
      password against the same user and asserts locked_until is non-null
      after the 5th call and null after the 4th.

  - id: 'SEC-002'
    severity: low
    category: 'Defense-in-Depth'
    finding: >-
      TOTP secret stored as plaintext base32 in users.mfa_secret. A DB
      dump leaks the ability to reconstruct future TOTP codes.
    suggested_owner: dev
    fix: >-
      Encrypt mfa_secret at rest via pgcrypto symmetric encryption with
      a key sourced from env (TOTP_SECRET_KEY), or move secrets to KMS.

  - id: 'DATA-001'
    severity: low
    category: 'Data Integrity'
    finding: >-
      refresh_tokens.replaced_by is UUID with no FK constraint back to
      refresh_tokens(id). Chain corruption cannot be detected at DB layer.
    suggested_owner: data-engineer
    fix: >-
      Add FOREIGN KEY (tenant_id, replaced_by) REFERENCES
      refresh_tokens(tenant_id, id) ON DELETE SET NULL.

