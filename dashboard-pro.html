<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Dashboard Financeiro PRO</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px}.container{max-width:1400px;margin:0 auto}.header{color:#fff;margin-bottom:40px;text-align:center}.header h1{font-size:3rem;text-shadow:0 2px 8px rgba(0,0,0,.3)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-bottom:30px}.card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 8px 24px rgba(0,0,0,.1);transition:transform .3s}.card:hover{transform:translateY(-6px)}.card h3{color:#666;font-size:.9rem;margin-bottom:12px;text-transform:uppercase}.card .val{font-size:2.5rem;font-weight:700;color:#667eea}.section{background:#fff;border-radius:12px;padding:28px;box-shadow:0 8px 24px rgba(0,0,0,.1);margin-bottom:30px}.section h2{font-size:1.4rem;margin-bottom:20px;padding-bottom:12px;border-bottom:3px solid #667eea}.method{display:flex;justify-content:space-between;padding:12px;background:#f8f9ff;margin:8px 0;border-radius:8px}.percent{background:#667eea;color:#fff;padding:4px 12px;border-radius:20px;font-weight:700}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.stat{text-align:center;padding:20px;background:#f8f9ff;border-radius:8px}.stat .num{font-size:2rem;font-weight:700;color:#667eea}.stat .lab{font-size:.8rem;color:#666;margin-top:8px}table{width:100%;border-collapse:collapse;margin-top:16px}th{padding:12px;text-align:left;font-weight:600;color:#667eea;border-bottom:2px solid #e0e0ff}td{padding:12px;border-bottom:1px solid #e0e0ff}tbody tr:hover{background:#f8f9ff}.badge{display:inline-block;padding:5px 10px;border-radius:20px;font-size:.75rem;font-weight:600}.badge-active{background:#d4edda;color:#155724}.badge-pending{background:#fff3cd;color:#856404}.badge-failed{background:#f8d7da;color:#721c24}.loading{color:#fff;text-align:center;padding:60px 20px}.spinner{width:50px;height:50px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px}@keyframes spin{to{transform:rotate(360deg)}}.refresh{position:fixed;bottom:30px;right:30px;background:#fff;border:3px solid #667eea;border-radius:50%;width:70px;height:70px;font-size:1.8rem;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.2)}.refresh:hover{transform:scale(1.1)}</style></head><body><div class="container"><div class="header"><h1>💰 Dashboard PRO</h1><p>GPS.X Financeiro</p></div><div id="c"><div class="loading"><div class="spinner"></div><p>Carregando...</p></div></div><div style="color:#fff;text-align:center;margin-top:50px;opacity:.8">Última atualização: <span id="u">—</span></div></div><button class="refresh" id="r" style="display:flex;align-items:center;justify-content:center">🔄</button><script>const a="/api/dashboard-finance";async function l(){try{const e=await fetch(a);if(!e.ok)throw new Error("HTTP "+e.status);const t=await e.json();!function(e){const a=e.health_metrics.total_mrr_cents/100,i=e.customers||[],s=e.confidence_scores||{},n=e.charge_breakdown||{};let r="<div class=\"grid\">";r+="<div class=\"card\"><h3>💵 MRR</h3><div class=\"val\">R$ "+a.toFixed(2)+"</div></div>",r+="<div class=\"card\"><h3>📊 30d</h3><div class=\"val\">R$ "+e.forecast.days_30.toFixed(2)+"</div></div>",r+="<div class=\"card\"><h3>📈 90d</h3><div class=\"val\">R$ "+e.forecast.days_90.toFixed(2)+"</div></div>",r+="<div class=\"card\"><h3>🏥 Saúde</h3><div class=\"val\">"+e.health_metrics.active_subscriptions+"</div></div>",r+="</div>",r+="<div class=\"section\"><h2>🔒 Confiança</h2>";Object.values(s).forEach(e=>{r+="<div class=\"method\"><span><strong>"+e.description+"</strong></span><span class=\"percent\">"+Math.round(100*e.confidence)+"%</span></div>"}),r+="</div>",r+="<div class=\"section\"><h2>📋 Métricas</h2><div class=\"stats\"><div class=\"stat\"><div class=\"num\">"+e.health_metrics.pending_charges+"</div><div class=\"lab\">Pendentes</div></div><div class=\"stat\"><div class=\"num\">"+e.health_metrics.failed_charges+"</div><div class=\"lab\">Falhas</div></div><div class=\"stat\"><div class=\"num\">"+e.health_metrics.active_subscriptions+"</div><div class=\"lab\">Ativas</div></div><div class=\"stat\"><div class=\"num\">"+(n.paid||0)+"</div><div class=\"lab\">Pagas</div></div></div></div>",r+="<div class=\"section\"><h2>👥 Clientes</h2><table><thead><tr><th>Cliente</th><th>Plano</th><th>Pagamento</th><th>Status</th><th>Próxima</th><th>Valor</th></tr></thead><tbody>",i.length>0?i.forEach(e=>{const a=(e.monthly_amount_cents/100).toFixed(2),t=new Date(e.next_charge_date).toLocaleDateString("pt-BR"),c="active"===e.subscription_status?"badge-active":"pending"===e.subscription_status?"badge-pending":"badge-failed";r+="<tr><td><strong>"+e.customer_name+"</strong></td><td>"+e.plan_name+"</td><td>"+e.payment_method.toUpperCase()+"</td><td><span class=\"badge "+c+"\">"+e.subscription_status+"</span></td><td>"+t+"</td><td style=\"text-align:right;font-weight:600\">R$ "+a+"</td></tr>"}):r+="<tr><td colspan=6 style=text-align:center;color:#999>Sem assinaturas</td></tr>",r+="</tbody></table></div>",document.getElementById("c").innerHTML=r,document.getElementById("u").textContent=new Date().toLocaleString("pt-BR")}(t)}catch(e){document.getElementById("c").innerHTML="<div style=background:#f8d7da;padding:20px;border-radius:8px>Erro: "+e.message+"</div>"}}document.getElementById("r").onclick=l,l(),setInterval(l,3e4)</script></body></html>
