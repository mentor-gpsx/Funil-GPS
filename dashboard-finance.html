<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard Financeiro</title>
  <style>
    body { font-family: Arial; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; padding: 20px; margin: 0; }
    .container { max-width: 1200px; margin: 0 auto; }
    .header { color: white; text-align: center; margin-bottom: 30px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
    .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    .value { font-size: 2rem; font-weight: bold; color: #667eea; }
    .loading { color: white; text-align: center; font-size: 18px; padding: 40px; }
    .error { background: white; padding: 20px; border-radius: 8px; color: red; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header"><h1>💰 Dashboard Financeiro</h1></div>
    <div id="content" class="loading">Carregando...</div>
  </div>
  <script>
    fetch('/api/dashboard-finance')
      .then(r => r.json())
      .then(data => {
        const mrr = data.health_metrics.total_mrr_cents / 100;
        document.getElementById('content').innerHTML = '<div class="grid">' +
          '<div class="card"><h3>MRR Total</h3><div class="value">R$ ' + mrr.toFixed(2) + '</div></div>' +
          '<div class="card"><h3>Forecast 30d</h3><div class="value">R$ ' + data.forecast.days_30.toFixed(2) + '</div></div>' +
          '<div class="card"><h3>Forecast 90d</h3><div class="value">R$ ' + data.forecast.days_90.toFixed(2) + '</div></div>' +
          '<div class="card"><h3>Assinaturas</h3><div class="value">' + data.health_metrics.active_subscriptions + '</div></div>' +
          '</div>';
      })
      .catch(e => {
        document.getElementById('content').innerHTML = '<div class="error">Erro: ' + e.message + '</div>';
      });
  </script>
</body>
</html>
