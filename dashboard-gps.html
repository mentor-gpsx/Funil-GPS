<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard Financeiro GPS.X</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      padding: 20px;
      color: #333;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    
    .header {
      background: #000;
      color: white;
      padding: 40px 20px;
      margin-bottom: 30px;
      border-radius: 8px;
      text-align: center;
    }
    .header h1 { font-size: 3rem; margin-bottom: 10px; }
    .header p { font-size: 1rem; opacity: 0.8; }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .card {
      background: white;
      border: 2px solid #000;
      border-radius: 8px;
      padding: 24px;
      transition: all .3s;
    }
    .card:hover { box-shadow: 0 8px 24px rgba(0,0,0,.2); transform: translateY(-4px); }
    .card h3 { color: #000; font-size: .9rem; margin-bottom: 12px; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }
    .card .value { font-size: 2.5rem; font-weight: 700; color: #000; }
    .card .sub { font-size: .9rem; color: #666; margin-top: 8px; }
    
    .section {
      background: white;
      border: 2px solid #000;
      border-radius: 8px;
      padding: 28px;
      margin-bottom: 30px;
    }
    .section h2 {
      font-size: 1.4rem;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 3px solid #000;
      color: #000;
      font-weight: 700;
    }
    
    .method {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: #f5f5f5;
      margin: 8px 0;
      border-radius: 6px;
      border-left: 4px solid #000;
    }
    .percent {
      background: #000;
      color: white;
      padding: 4px 12px;
      border-radius: 4px;
      font-weight: 700;
      font-size: .9rem;
    }
    
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .stat {
      text-align: center;
      padding: 20px;
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 6px;
    }
    .stat .num { font-size: 2rem; font-weight: 700; color: #000; }
    .stat .lab { font-size: .8rem; color: #666; margin-top: 8px; }
    
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }
    th {
      padding: 12px;
      text-align: left;
      font-weight: 700;
      color: white;
      background: #000;
      border: 1px solid #000;
    }
    td { padding: 12px; border: 1px solid #ddd; }
    tbody tr:hover { background: #f5f5f5; }
    
    .badge {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 4px;
      font-size: .75rem;
      font-weight: 700;
      border: 1px solid #000;
    }
    .badge-active { background: white; color: #000; }
    .badge-pending { background: #f5f5f5; color: #000; }
    .badge-failed { background: #000; color: white; }
    
    .loading { text-align: center; padding: 60px 20px; color: #666; }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #f5f5f5;
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .error {
      background: #fff5f5;
      border: 2px solid #000;
      color: #000;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    
    .footer { text-align: center; margin-top: 50px; color: #666; font-size: .9rem; }
    
    .refresh {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #000;
      color: white;
      border: none;
      border-radius: 50%;
      width: 70px;
      height: 70px;
      font-size: 1.8rem;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(0,0,0,.3);
      transition: all .3s;
    }
    .refresh:hover { transform: scale(1.1) rotate(180deg); }
    
    .amount { text-align: right; font-weight: 600; color: #000; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>GPS.X FINANCEIRO</h1>
      <p>Dashboard de Faturamento Automático</p>
    </div>

    <div id="content">
      <div class="loading">
        <div class="spinner"></div>
        <p>Carregando dados reais...</p>
      </div>
    </div>

    <div class="footer">
      Última atualização: <span id="lastUpdate">—</span> • Auto-refresh a cada 30s
    </div>
  </div>

  <button class="refresh" id="refreshBtn">🔄</button>

  <script>
    const API_URL = '/api/dashboard-finance';
    const contentDiv = document.getElementById('content');
    const refreshBtn = document.getElementById('refreshBtn');

    async function loadDashboard() {
      try {
        contentDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>Carregando dados...</p></div>';
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        renderDashboard(data);
        document.getElementById('lastUpdate').textContent = new Date().toLocaleString('pt-BR');
      } catch(e) {
        contentDiv.innerHTML = '<div class="error"><strong>⚠️ Erro ao carregar:</strong> ' + e.message + '<br><small>Certifique-se que o servidor está rodando em http://localhost:3001</small></div>';
      }
    }

    function renderDashboard(data) {
      const mrr = data.health_metrics.total_mrr_cents / 100;
      const f30 = data.forecast.days_30;
      const f90 = data.forecast.days_90;
      const customers = data.customers || [];
      const confidence = data.confidence_scores || {};
      const breakdown = data.charge_breakdown || {};

      let html = '<div class="grid">';
      html += '<div class="card"><h3>MRR Total</h3><div class="value">R$ ' + mrr.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + '</div><div class="sub">' + data.health_metrics.active_subscriptions + ' assinaturas ativas</div></div>';
      html += '<div class="card"><h3>Forecast 30 Dias</h3><div class="value">R$ ' + f30.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + '</div><div class="sub">Com ponderação de confiança</div></div>';
      html += '<div class="card"><h3>Forecast 90 Dias</h3><div class="value">R$ ' + f90.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + '</div><div class="sub">Projeção trimestral</div></div>';
      html += '<div class="card"><h3>Pendências</h3><div class="value">' + (data.health_metrics.pending_charges + data.health_metrics.failed_charges) + '</div><div class="sub">Cobranças em atraso</div></div>';
      html += '</div>';

      html += '<div class="grid">';
      html += '<div class="section"><h2>Confiança de Recebimento</h2><div>';
      Object.values(confidence).forEach(m => {
        html += '<div class="method"><span><strong>' + m.description + '</strong></span><span class="percent">' + Math.round(m.confidence * 100) + '%</span></div>';
      });
      html += '</div></div>';

      html += '<div class="section"><h2>Métricas de Saúde</h2><div class="stats">';
      html += '<div class="stat"><div class="num">' + data.health_metrics.pending_charges + '</div><div class="lab">Pendentes</div></div>';
      html += '<div class="stat"><div class="num">' + data.health_metrics.failed_charges + '</div><div class="lab">Falhas</div></div>';
      html += '<div class="stat"><div class="num">' + data.health_metrics.active_subscriptions + '</div><div class="lab">Ativas</div></div>';
      html += '<div class="stat"><div class="num">' + (breakdown.paid || 0) + '</div><div class="lab">Pagas</div></div>';
      html += '</div></div>';
      html += '</div>';

      html += '<div class="section"><h2>Distribuição de Cobranças</h2><div class="stats" style="grid-template-columns: repeat(4, 1fr)">';
      html += '<div class="stat"><div class="num">' + (breakdown.paid || 0) + '</div><div class="lab">Pago</div></div>';
      html += '<div class="stat"><div class="num">' + (breakdown.pending || 0) + '</div><div class="lab">Pendente</div></div>';
      html += '<div class="stat"><div class="num">' + (breakdown.failed || 0) + '</div><div class="lab">Falha</div></div>';
      html += '<div class="stat"><div class="num">' + (breakdown.refunded || 0) + '</div><div class="lab">Reembolso</div></div>';
      html += '</div></div>';

      html += '<div class="section"><h2>Clientes e Assinaturas</h2><table><thead><tr><th>Cliente</th><th>Plano</th><th>Pagamento</th><th>Status</th><th>Próxima Cobrança</th><th class="amount">Valor/Mês</th></tr></thead><tbody>';
      if (customers.length > 0) {
        customers.forEach(c => {
          const amt = (c.monthly_amount_cents / 100).toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2});
          const nextDate = new Date(c.next_charge_date).toLocaleDateString('pt-BR');
          const badgeClass = c.subscription_status === 'active' ? 'badge-active' : c.subscription_status === 'pending' ? 'badge-pending' : 'badge-failed';
          html += '<tr><td><strong>' + c.customer_name + '</strong><br><small style="color:#999">' + c.customer_email + '</small></td><td>' + c.plan_name + '</td><td><strong>' + c.payment_method.toUpperCase() + '</strong></td><td><span class="badge ' + badgeClass + '">' + c.subscription_status + '</span></td><td>' + nextDate + '</td><td class="amount">R$ ' + amt + '</td></tr>';
        });
      } else {
        html += '<tr><td colspan="6" style="text-align: center; color: #999; padding: 30px;">Nenhuma assinatura ativa</td></tr>';
      }
      html += '</tbody></table></div>';

      document.getElementById('content').innerHTML = html;
    }

    refreshBtn.onclick = loadDashboard;
    loadDashboard();
    setInterval(loadDashboard, 30000);
  </script>
</body>
</html>
